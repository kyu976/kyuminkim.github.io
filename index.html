// ── Animate on scroll ──
function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}
function AnimateIn({ children, className = "", delay = 0 }) {
  const ref = useRef(null);
  const visible = useInView(ref);
  return (
    <div ref={ref} className={className} style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(30px)", transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s` }}>
      {children}
    </div>
  );
}

// ── App Router ──
function App() {
  const [route, setRoute] = useState(window.location.hash || "#/");

  useEffect(() => {
    const handler = () => setRoute(window.location.hash || "#/");
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);

  const projectMatch = route.match(/^#\/project\/(.+)$/);
  const page = projectMatch ? "project" : "home";
  const project = projectMatch ? PROJECTS.find((p) => p.id === projectMatch[1]) : null;

  return (
    <div className="min-h-screen" style={{ background: "#0C0C0C", fontFamily: "'DM Sans', sans-serif" }}>
      <Nav page={page} />
      {page === "project" ? <ProjectPage project={project} /> : <HomePage />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
