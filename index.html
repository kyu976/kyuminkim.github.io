// ── Helpers ──
function useScrollTop(dep) {
  useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [dep]);
}
function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}
function AnimateIn({ children, className = "", delay = 0 }) {
  const ref = useRef(null);
  const v = useInView(ref);
  return (
    <div ref={ref} className={className} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(30px)", transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s` }}>
      {children}
    </div>
  );
}

          <p className="text-lg leading-relaxed" style={{ color: "#C0BDB6" }}>{project.overview}</p>
        </AnimateIn>
      </section>
      {project.sections.map((s, i) => (
        <section key={i} className="px-6 md:px-10 py-16 max-w-3xl" style={{ borderTop: "1px solid rgba(255,255,255,0.06)" }}>

            <h2 className="text-2xl md:text-3xl mb-6" style={{ fontFamily: "'Instrument Serif', Georgia, serif", color: "#F0EDE6" }}>{s.heading}</h2>

      <section className="px-6 md:px-10 py-16 max-w-3xl">
        <AnimateIn>
          <a href={project.github} target="_blank" className="inline-flex items-center gap-3 px-8 py-4 bg-lime-400 text-black font-semibold text-sm rounded-full hover:-translate-y-0.5 hover:shadow-lg hover:shadow-lime-400/25 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
            View Code on GitHub →

      </section>
      <section className="px-6 md:px-10 py-16 border-t border-white/10 grid grid-cols-1 md:grid-cols-2 gap-6" style={{ background: "#141414" }}>
        {prev ? (<a href={`#/project/${prev.id}`} className="group p-6 rounded-xl border border-white/10 hover:border-white/20 transition-all"><div className="text-xs font-mono uppercase tracking-widest mb-2" style={{ color: "#5A5854" }}>← Previous</div><div className="text-lg group-hover:text-lime-400 transition-colors" style={{ fontFamily: "'Instrument Serif', Georgia, serif", color: "#F0EDE6" }}>{prev.title}</div></a>) : <div />}
        {next ? (<a href={`#/project/${next.id}`} className="group p-6 rounded-xl border border-white/10 hover:border-white/20 transition-all text-right"><div className="text-xs font-mono uppercase tracking-widest mb-2" style={{ color: "#5A5854" }}>Next →</div><div className="text-lg group-hover:text-lime-400 transition-colors" style={{ fontFamily: "'Instrument Serif', Georgia, serif", color: "#F0EDE6" }}>{next.title}</div></a>) : <div />}
      </section>
      <footer className="px-6 md:px-10 py-10 border-t border-white/10 flex justify-between items-center flex-wrap gap-4 text-xs" style={{ color: "#5A5854" }}>
        <span>© 2026 Kaylee Kim</span>
        <span><a href="https://github.com/kyu976" target="_blank" className="hover:text-lime-400 transition-colors">GitHub</a> · <a href="https://www.linkedin.com/in/kyumin-kim-640444268/" target="_blank" className="hover:text-lime-400 transition-colors">LinkedIn</a></span>
      </footer>
    </div>
  );
}

// ── App Router ──
function App() {
  const [route, setRoute] = useState(window.location.hash || "#/");
  useEffect(() => {
    const handler = () => setRoute(window.location.hash || "#/");
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);
  const m = route.match(/^#\/project\/(.+)$/);
  const page = m ? "project" : "home";
  const project = m ? PROJECTS.find((p) => p.id === m[1]) : null;
  return (
    <div className="min-h-screen" style={{ background: "#0C0C0C", fontFamily: "'DM Sans', sans-serif" }}>
      <Nav page={page} />
      {page === "project" ? <ProjectPage project={project} /> : <HomePage />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
